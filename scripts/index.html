<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness Coach Hybrid</title>
  </head>
  <body>
    <script src="readiness-core.js"></script>
    <script>
      window.ai_edge_gallery_get_result = async (data) => {
        try {
          const payload = JSON.parse(data || '{}');
          return JSON.stringify(window.FitnessCoachReadiness.execute(payload));
        } catch (error) {
          return JSON.stringify({ error: `Invalid request: ${error.message}` });
        }
      };
    </script>
  </body>
</html>
